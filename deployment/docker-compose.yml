# SSH & RDP Manager - Docker Compose Deployment
version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ssh-rdp-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/ssh-manager.db
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/.env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/${USER}/.ssh:/root/.ssh:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ssh-rdp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl-certs:/etc/letsencrypt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ssl-certs:
